name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0   # the standard Dockerfile linter
        with:
          dockerfile: Dockerfile

  test:
    runs-on: ubuntu-latest
    services:
      redis:                         # tests in test_app.py need a real Redis
        image: redis:7-alpine
        ports: ["6379:6379"]         # on localhost:6379, app's default
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt   # pytest and httpx are already pinned here
      - run: pytest -v                         # -v shows the @needs_redis tests ran, not skipped

  build:
    runs-on: ubuntu-latest
    needs: [lint-dockerfile, test]   # only build if lint and tests pass
    permissions:
      contents: read
      packages: write                # needed to push to GHCR
    steps:
      - uses: actions/checkout@v6
      - name: Lowercase the image name          # GHCR paths must be lowercase; github.repository keeps my account's capitals
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}   # build on PRs, publish only on push to main
          tags: ${{ env.IMAGE }}:${{ github.sha }}
