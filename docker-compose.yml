services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
       REDIS_HOST: redis
       REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy # Don't start the API until Redis passes  

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"] # From compose
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
