# non-secret config
apiVersion: v1
kind: ConfigMap
metadata:
  name: render-api-config
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
---
# the Redis password, shared by Redis and the API
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
type: Opaque
stringData:
  # stringData is plain text here; Kubernetes base64-encodes it. base64 is not encryption,
  # so this is a demo value only, never a real password committed to a public repo.
  REDIS_PASSWORD: "change-me-locally"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: render-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: render-api
  template:
    metadata:
      labels:
        app: render-api
    spec:
      containers:
        - name: render-api
          image: render-api:dev
          imagePullPolicy: IfNotPresent   # use the image loaded into minikube, don't pull from a registry
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: render-api-config    # REDIS_HOST and REDIS_PORT
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: REDIS_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthz               # /healthz returns 503 until Redis is reachable
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: render-api
spec:
  type: NodePort                           # reachable from outside the cluster, no ingress controller needed
  selector:
    app: render-api
  ports:
    - port: 8000
      targetPort: 8000
